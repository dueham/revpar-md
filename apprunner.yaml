version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt
run:
  command: streamlit run revpar_app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: S3_BUCKET
      value: revpar-md-data
    - name: AWS_REGION
      value: us-east-1
    - name: STREAMLIT_SERVER_MAX_UPLOAD_SIZE
      value: "200"
    - name: PYTHONUNBUFFERED
      value: "1"
